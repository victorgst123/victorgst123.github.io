
<style>
  @keyframes flowRight { from { transform: translateX(-20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  .slot { transition: fill .3s, stroke .3s; }
  .slot.filled { animation: pulse 2s ease-in-out infinite; }
  .flow-arrow { transition: opacity .3s; }
  .btn { cursor:pointer; user-select:none; padding:6px 14px; border-radius:6px; border:1px solid var(--color-border-secondary); background:var(--color-background-secondary); color:var(--color-text-primary); font-size:13px; font-family:var(--font-sans); }
  .btn:hover { background:var(--color-border-tertiary); }
  .btn:active { transform:scale(.97); }
  .btn:disabled { opacity:.4; cursor:default; }
  .controls { display:flex; gap:10px; align-items:center; justify-content:center; margin:8px 0 0; }
  .info { font-size:12px; color:var(--color-text-secondary); font-family:var(--font-mono); min-width:180px; text-align:center; }
</style>
<h2 class="sr-only">Interactive diagram of a Linux pipe: a kernel buffer connecting a writer process to a reader process via file descriptors</h2>
<svg width="100%" viewBox="0 0 680 420" role="img">
  <title>Linux pipe as a kernel buffer</title>
  <desc>Two processes in user space connected by a FIFO buffer in kernel space. Process A writes via fd[1], Process B reads via fd[0].</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User space region -->
  <rect x="30" y="20" width="620" height="130" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text class="ts" x="340" y="40" text-anchor="middle" fill="var(--color-text-tertiary)">User space</text>

  <!-- Process A (writer) -->
  <g class="c-teal">
    <rect x="60" y="55" width="200" height="76" rx="10" stroke-width="0.5"/>
    <text class="th" x="160" y="82" text-anchor="middle" dominant-baseline="central">Process A</text>
    <text class="ts" x="160" y="105" text-anchor="middle" dominant-baseline="central">Writer</text>
  </g>

  <!-- Process B (reader) -->
  <g class="c-purple">
    <rect x="420" y="55" width="200" height="76" rx="10" stroke-width="0.5"/>
    <text class="th" x="520" y="82" text-anchor="middle" dominant-baseline="central">Process B</text>
    <text class="ts" x="520" y="105" text-anchor="middle" dominant-baseline="central">Reader</text>
  </g>

  <!-- Kernel space region -->
  <rect x="30" y="170" width="620" height="210" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text class="ts" x="340" y="192" text-anchor="middle" fill="var(--color-text-tertiary)">Kernel space</text>

  <!-- write() system call arrow -->
  <path d="M160 131 L160 220" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <text class="ts" x="110" y="178" fill="#0F6E56">write(fd[1])</text>

  <!-- read() system call arrow -->
  <path d="M520 220 L520 131" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <text class="ts" x="540" y="178" fill="#534AB7">read(fd[0])</text>

  <!-- Pipe buffer container -->
  <rect x="100" y="220" width="480" height="80" rx="8" fill="none" stroke="var(--color-border-secondary)" stroke-width="1"/>
  <text class="ts" x="340" y="248" text-anchor="middle" fill="var(--color-text-secondary)">Pipe buffer (FIFO, default 64 KB)</text>

  <!-- Buffer slots -->
  <g id="buffer-slots">
    <rect class="slot" id="s0" x="120" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s1" x="178" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s2" x="236" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s3" x="294" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s4" x="352" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s5" x="410" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <rect class="slot" id="s6" x="468" y="258" width="50" height="30" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  </g>
  <!-- Slot text labels -->
  <g id="slot-labels">
    <text class="ts" id="l0" x="145" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l1" x="203" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l2" x="261" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l3" x="319" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l4" x="377" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l5" x="435" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
    <text class="ts" id="l6" x="493" y="277" text-anchor="middle" dominant-baseline="central" opacity="0"></text>
  </g>

  <!-- Flow direction arrow inside buffer -->
  <path d="M135 296 L525 296" fill="none" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.4"/>
  <text class="ts" x="340" y="312" text-anchor="middle" fill="var(--color-text-tertiary)">Data flows left → right (FIFO)</text>

  <!-- fd labels -->
  <g class="c-teal">
    <rect x="95" y="330" width="70" height="28" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="348" text-anchor="middle" dominant-baseline="central" style="font-size:12px">fd[1]</text>
  </g>
  <text class="ts" x="130" y="370" text-anchor="middle" fill="var(--color-text-secondary)">Write end</text>

  <g class="c-purple">
    <rect x="505" y="330" width="70" height="28" rx="6" stroke-width="0.5"/>
    <text class="th" x="540" y="348" text-anchor="middle" dominant-baseline="central" style="font-size:12px">fd[0]</text>
  </g>
  <text class="ts" x="540" y="370" text-anchor="middle" fill="var(--color-text-secondary)">Read end</text>

  <!-- pipe() call label -->
  <text class="ts" x="340" y="400" text-anchor="middle" fill="var(--color-text-tertiary)">Created by pipe(int fd[2]) system call</text>
</svg>

<div class="controls">
  <button class="btn" id="write-btn" onclick="writeData()">write()</button>
  <button class="btn" id="read-btn" onclick="readData()" disabled>read()</button>
  <button class="btn" onclick="resetPipe()">Reset</button>
  <span class="info" id="status">Buffer: 0 / 7 slots</span>
</div>

<script>
const CAP = 7;
const DATA = ['H','e','l','l','o','!','\\n'];
let buf = [];
let dataIdx = 0;

function updateUI() {
  for (let i = 0; i < CAP; i++) {
    const slot = document.getElementById('s'+i);
    const label = document.getElementById('l'+i);
    if (i < buf.length) {
      slot.setAttribute('fill','#5DCAA5');
      slot.setAttribute('stroke','#0F6E56');
      slot.classList.add('filled');
      label.textContent = buf[i];
      label.setAttribute('opacity','1');
      label.setAttribute('fill','#04342C');
    } else {
      slot.setAttribute('fill','var(--color-background-primary)');
      slot.setAttribute('stroke','var(--color-border-tertiary)');
      slot.classList.remove('filled');
      label.textContent = '';
      label.setAttribute('opacity','0');
    }
  }
  document.getElementById('write-btn').disabled = buf.length >= CAP;
  document.getElementById('read-btn').disabled = buf.length === 0;
  document.getElementById('status').textContent = 'Buffer: ' + buf.length + ' / ' + CAP + ' slots';
}

function writeData() {
  if (buf.length >= CAP) return;
  buf.push(DATA[dataIdx % DATA.length]);
  dataIdx++;
  updateUI();
}

function readData() {
  if (buf.length === 0) return;
  buf.shift();
  updateUI();
}

function resetPipe() {
  buf = [];
  dataIdx = 0;
  updateUI();
}
</script>
